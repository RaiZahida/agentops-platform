name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest

      - name: Convert repository owner to lowercase
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV

      - name: Create short commit SHA
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker images
        run: |
          docker build \
            -t ghcr.io/${{ env.OWNER_LC }}/agentops-platform:latest \
            -t ghcr.io/${{ env.OWNER_LC }}/agentops-platform:${{ env.SHORT_SHA }} \
            .

      - name: Push Docker images
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/agentops-platform:latest
          docker push ghcr.io/${{ env.OWNER_LC }}/agentops-platform:${{ env.SHORT_SHA }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/

      - name: Update deployment to new image
        run: |
          kubectl set image deployment/agentops-deployment \
          agentops=ghcr.io/${{ env.OWNER_LC }}/agentops-platform:${{ env.SHORT_SHA }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/agentops-deployment

      - name: Verify deployment
        run: |
          kubectl get deployments
          kubectl get pods
          kubectl get services