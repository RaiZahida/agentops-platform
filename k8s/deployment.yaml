apiVersion: apps/v1
kind: Deployment

metadata:
  name: agentops-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: agentops

  template:
    metadata:
      labels:
        app: agentops

    spec:
      containers:
        - name: agentops
          image: ghcr.io/raizahida/agentops-platform:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-secret
                  key: GROQ_API_KEY

            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: agentops-config
                  key: APP_NAME

            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: agentops-config
                  key: ENVIRONMENT

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
